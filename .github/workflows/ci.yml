name: CI — Lint & Audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g html-validate
      - run: html-validate "docs/*.html" "docs/infographics/*.html" --rule '{"void-style":"off"}' || true
